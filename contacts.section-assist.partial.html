<section class="assist" aria-labelledby="assist-title">
	<p class="assist__background-title" aria-hidden="true">Contacts</p>

	<div class="assist__layout">
		<div class="assist__content">
			<h2 class="assist__title" id="assist-title">We're Here to Assist You</h2>

			<p class="assist__description">
				Feel free to reach out to us with any inquiries or to book your
				enchanting glamping getaway. We're here to assist you!
			</p>

			<ul class="assist__contact-list">
				<li class="assist__contact-item">
					<span class="assist__contact-icon-wrap" aria-hidden="true">
						<svg
                            width="40"
							class="assist__contact-icon"
							viewBox="0 0 64 64"
							xmlns="http://www.w3.org/2000/svg"
							fill="none"
						>
							<path
								d="M7 43.5L32 12L57 43.5"
								stroke="currentColor"
								stroke-width="3"
								stroke-linecap="round"
								stroke-linejoin="round"
							/>
							<path
								d="M13.5 43.5H50.5"
								stroke="currentColor"
								stroke-width="3"
								stroke-linecap="round"
							/>
							<rect
								x="26"
								y="33"
								width="12"
								height="10.5"
								rx="2"
								stroke="currentColor"
								stroke-width="3"
							/>
						</svg>
					</span>
					<div>
						<p class="assist__contact-label">Address</p>
						<p class="assist__contact-text">NF-1118, Concrete, WA 98237, USA</p>
					</div>
				</li>

				<li class="assist__contact-item">
					<span class="assist__contact-icon-wrap" aria-hidden="true">
						<svg
                            width="30"
							class="assist__contact-icon"
							viewBox="0 0 64 64"
							xmlns="http://www.w3.org/2000/svg"
							fill="none"
						>
							<path
								d="M46.9 57.4C41 57.4 34.8 55.5 28.3 51.6C22.6 48.2 17.2 43.4 12.5 38.7C7.8 34 3 28.6 0 22.9C-0.8 21.3 0.2 19.4 2 18.9L12.1 16.2C13.6 15.8 15.1 16.6 15.7 18L19.2 26.4C19.8 27.7 19.4 29.3 18.3 30.2L13.2 34.1C16 38.5 19.4 41.9 23.8 44.8L27.7 39.7C28.6 38.6 30.2 38.2 31.5 38.8L39.9 42.3C41.3 42.9 42.1 44.4 41.7 45.9L39 56C38.5 57.8 36.6 58.8 35 58C31.6 56.3 28.2 54 25 51.2"
								stroke="currentColor"
								stroke-width="3"
								stroke-linecap="round"
								stroke-linejoin="round"
								transform="translate(11 2)"
							/>
							<path
								d="M39 11C44.5 11.6 48.8 15.9 49.4 21.4"
								stroke="currentColor"
								stroke-width="3"
								stroke-linecap="round"
							/>
							<path
								d="M39 4C48.3 4.8 55.6 12.1 56.4 21.4"
								stroke="currentColor"
								stroke-width="3"
								stroke-linecap="round"
							/>
						</svg>
					</span>
					<div>
						<p class="assist__contact-label">Contacts</p>
						<p>
							<a class="assist__contact-link" href="tel:+12345678900"
								>+1 (234) 567 89 00</a
							>
						</p>
						<p>
							<a class="assist__contact-link" href="mailto:hidden.heaven@email.com"
								>hidden.heaven@email.com</a
							>
						</p>
					</div>
				</li>
			</ul>
		</div>

		<form class="assist__form" action="#" method="post">
			<div class="assist__field">
				<label class="assist__label" for="assist-full-name">Full name</label>
				<input
					class="assist__input"
					id="assist-full-name"
					name="full-name"
					type="text"
					autocomplete="name"
					placeholder="Enter your full name*"
					required
				/>
			</div>

			<div class="assist__field">
				<label class="assist__label" for="assist-phone">Phone number</label>
				<input
					class="assist__input"
					id="assist-phone"
					name="phone"
					type="tel"
					autocomplete="tel"
					placeholder="Enter your phone number*"
					required
				/>
			</div>

			<div class="assist__field">
				<label class="assist__label" for="assist-email">E-mail</label>
				<input
					class="assist__input"
					id="assist-email"
					name="email"
					type="email"
					autocomplete="email"
					placeholder="Enter your e-mail*"
					required
				/>
			</div>

			<div class="assist__field">
				<label class="assist__label" for="assist-message">Message</label>
				<textarea
					class="assist__textarea"
					id="assist-message"
					name="message"
					placeholder="Your Message"
				></textarea>
			</div>

			<button class="assist__submit" type="submit">Send</button>
		</form>
	</div>
</section>
